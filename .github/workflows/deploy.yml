name: Deploy to Cloudflare Workers

# develop  → staging Worker (devingit-se → devingit.se)
# master   → production Worker (livingit-se → livingit.se)
on:
  push:
    branches: [develop, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set build environment
        run: |
          echo "ROBOTS_ENV=${{ github.ref == 'refs/heads/develop' && 'develop' || 'production' }}" >> $GITHUB_ENV
          echo "PUBLIC_API_URL=${{ github.ref == 'refs/heads/develop' && 'https://api.devingit.se' || 'https://api.livingit.se' }}" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Patch worker name for staging
        if: github.ref == 'refs/heads/develop'
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/server/wrangler.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.name = 'devingit-se';
            fs.writeFileSync(p, JSON.stringify(c));
          "

      - name: Patch worker name for production
        if: github.ref == 'refs/heads/master'
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/server/wrangler.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.name = 'livingit-se';
            c.vars = { ...c.vars, PUBLIC_API_URL: 'https://api.livingit.se' };
            fs.writeFileSync(p, JSON.stringify(c));
          "

      - name: Deploy to devingit-se (devingit.se)
        if: github.ref == 'refs/heads/develop'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production (livingit.se)
        if: github.ref == 'refs/heads/master'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
