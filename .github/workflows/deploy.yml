name: Deploy to Cloudflare Workers

# develop  → staging Worker (devingit-se → devingit.se)
# master   → production Worker (livingit-se → livingit.se)
on:
  push:
    branches: [develop, master]

env:
  STAGING_API_URL: "https://api.devingit.se"
  PRODUCTION_API_URL: "https://api.livingit.se"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set build environment
        run: |
          echo "ROBOTS_ENV=${{ github.ref == 'refs/heads/develop' && 'develop' || 'production' }}" >> $GITHUB_ENV
          echo "PUBLIC_API_URL=${{ github.ref == 'refs/heads/develop' && env.STAGING_API_URL || env.PRODUCTION_API_URL }}" >> $GITHUB_ENV

      - name: Validate build environment
        run: |
          if [ -z "$PUBLIC_API_URL" ]; then echo "ERROR: PUBLIC_API_URL is empty"; exit 1; fi

      - name: Build
        run: npm run build

      - name: Patch wrangler.json for staging
        if: github.ref == 'refs/heads/develop'
        env:
          PATCH_API_URL: ${{ env.STAGING_API_URL }}
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/server/wrangler.json';
            if (!fs.existsSync(p)) { console.error('ERROR: ' + p + ' not found — adapter may not have generated it'); process.exit(1); }
            let c;
            try { c = JSON.parse(fs.readFileSync(p, 'utf8')); } catch (e) { console.error('ERROR: Failed to parse ' + p + ': ' + e.message); process.exit(1); }
            c.name = 'devingit-se';
            c.vars = { ...c.vars, PUBLIC_API_URL: process.env.PATCH_API_URL };
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Patch wrangler.json for production
        if: github.ref == 'refs/heads/master'
        env:
          PATCH_API_URL: ${{ env.PRODUCTION_API_URL }}
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/server/wrangler.json';
            if (!fs.existsSync(p)) { console.error('ERROR: ' + p + ' not found — adapter may not have generated it'); process.exit(1); }
            let c;
            try { c = JSON.parse(fs.readFileSync(p, 'utf8')); } catch (e) { console.error('ERROR: Failed to parse ' + p + ': ' + e.message); process.exit(1); }
            c.name = 'livingit-se';
            c.vars = { ...c.vars, PUBLIC_API_URL: process.env.PATCH_API_URL };
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - name: Deploy to devingit-se (devingit.se)
        if: github.ref == 'refs/heads/develop'
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to production (livingit.se)
        if: github.ref == 'refs/heads/master'
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
