name: Dependabot — Build & Auto-merge to Develop

# Runs on every Dependabot PR targeting develop.
# Builds the site; merges the PR automatically if the build succeeds.
on:
  pull_request:
    branches: [develop]

# Required for GITHUB_TOKEN to merge PRs and push to develop.
# Enable in: GitHub → Settings → Actions → General → Workflow permissions → Read and write
permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Merge PR into develop
        run: gh pr merge --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
